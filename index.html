<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tribu sin guía - Confesiones</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#2f6f3e,#5f8f4f);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
color:white;
}

.logo{
width:120px;
border-radius:50%;
margin-top:30px;
border:5px solid white;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
transition:0.3s;
}

.logo:hover{
transform:scale(1.05);
}

h1{
margin-top:10px;
font-size:34px;
letter-spacing:1px;
}

.container{
background:white;
color:#333;
padding:25px;
border-radius:18px;
width:90%;
max-width:600px;
margin-top:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

textarea,input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
font-size:15px;
outline:none;
}

textarea:focus,input:focus{
border-color:#2f6f3e;
}

button{
margin-top:10px;
padding:10px 18px;
background:#2f6f3e;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
background:#245730;
}

.muro{
display:flex;
flex-direction:column;
align-items:center;
width:100%;
}

.post{
background:white;
color:#333;
padding:18px;
border-radius:16px;
margin-top:20px;
width:90%;
max-width:450px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
transition:0.2s;
}

.post:hover{
transform:translateY(-3px);
}

.post p{
font-size:16px;
margin-bottom:8px;
}

.autor{
font-weight:bold;
margin-bottom:5px;
}

.like{
cursor:pointer;
color:#e63946;
font-weight:bold;
margin-top:8px;
}

.comment{
margin-top:6px;
font-size:14px;
background:#f5f5f5;
padding:6px 10px;
border-radius:8px;
}

.comment-box{
margin-top:8px;
display:flex;
gap:6px;
}

.comment-box input{
flex:1;
}

</style>

</head>


<body>

<img src="logo.png" class="logo">

<h1>Tribu sin guía</h1>

<div class="container">

<textarea id="texto" placeholder="Tu confesión"></textarea>

<input id="autor" placeholder="Nombre (opcional)">

<button id="btnPublicar">Publicar</button>

</div>

<div class="muro" id="muro"></div>

<script>

const SUPABASE_URL = "https://gxnhpuhyijybpfectzre.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4bmhwdWh5aWp5YnBmZWN0enJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NjQyODYsImV4cCI6MjA4ODM0MDI4Nn0.jVPR1eipK3MMJRNVoNsB-GY3_OH2JfK7h1jF-kwJvOU"

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)


async function obtenerIP(){
try{
const r = await fetch("https://api.ipify.org?format=json")
const data = await r.json()
return data.ip
}catch{
return "desconocida"
}
}


async function publicar(){

let texto=document.getElementById("texto").value.trim()
let autor=document.getElementById("autor").value.trim()

if(texto===""){
alert("Escribe una confesión")
return
}

if(!autor) autor="Anónimo"

let ip = await obtenerIP()

const {error}=await supabaseClient
.from("confesiones")
.insert([{texto,autor,ip}])

if(error){
console.log(error)
alert("Error al publicar")
return
}

document.getElementById("texto").value=""
document.getElementById("autor").value=""

cargar()

}


async function cargar(){

const {data,error}=await supabaseClient
.from("confesiones")
.select("*")
.order("fecha",{ascending:false})

if(error){
console.log(error)
return
}

let muro=document.getElementById("muro")
muro.innerHTML=""

data.forEach(c=>{

muro.innerHTML+=`

<div class="post">

<p>${c.texto}</p>

<div class="autor">${c.autor}</div>

<div class="like" onclick="like(${c.id},${c.likes || 0})">
❤️ ${c.likes || 0}
</div>

<div id="comentarios-${c.id}"></div>

<div class="comment-box">
<input id="c-${c.id}" placeholder="Comentar">
<button onclick="comentar(${c.id})">Enviar</button>
</div>

</div>

`

cargarComentarios(c.id)

})

}


async function like(id,likes){

await supabaseClient
.from("confesiones")
.update({likes:likes+1})
.eq("id",id)

cargar()

}


async function comentar(id){

let texto=document.getElementById("c-"+id).value.trim()

if(texto==="") return

await supabaseClient
.from("comentarios")
.insert([{confesion_id:id,texto,autor:"Anónimo"}])

document.getElementById("c-"+id).value=""

cargarComentarios(id)

}


async function cargarComentarios(id){

const {data}=await supabaseClient
.from("comentarios")
.select("*")
.eq("confesion_id",id)

let div=document.getElementById("comentarios-"+id)

div.innerHTML=""

data.forEach(c=>{
div.innerHTML+=`<div class="comment">💬 ${c.texto}</div>`
})

}

document.getElementById("btnPublicar").addEventListener("click",publicar)

cargar()

</script>

</body>

</html>
